services:
  - type: web
    name: neural-vision-studio
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python -c "from ultralytics import YOLO; YOLO('yolov8n.pt')"
    startCommand: gunicorn app:app --workers 1 --threads 4 --timeout 180
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: YOLO_MODEL
        value: yolov8n.pt
